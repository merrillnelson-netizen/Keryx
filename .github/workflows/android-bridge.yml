name: Build Keryx Bridge APK

on:
  push:
    branches: [main]
    paths:
      - 'android-bridge/**'
  pull_request:
    paths:
      - 'android-bridge/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-bridge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.11.1/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar || \
          curl -fsSL \
            "https://services.gradle.org/distributions/gradle-8.11.1-wrapper.jar.sha256" \
            > /dev/null && \
          wget -q \
            "https://github.com/gradle/gradle/raw/v8.11.1/gradle/wrapper/gradle-wrapper.jar" \
            -O gradle/wrapper/gradle-wrapper.jar || true

      - name: Bootstrap wrapper if jar missing
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Wrapper jar not found — bootstrapping via system gradle"
            gradle wrapper --gradle-version=8.11.1 --distribution-type=bin
          fi
          chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeryxBridge-debug
          path: android-bridge/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create Release (on main branch push)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-bridge-${{ github.run_number }}
          name: "Keryx Bridge v1.0.${{ github.run_number }}"
          body: "Automated build from commit ${{ github.sha }}"
          files: android-bridge/app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
