name: Build Keryx Bridge APK

on:
  push:
    branches: [main]
    paths:
      - 'android-bridge/**'
  pull_request:
    paths:
      - 'android-bridge/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-bridge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant gradlew execute permission
        run: chmod +x gradlew 2>/dev/null || gradle wrapper --gradle-version=8.11.1

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeryxBridge-debug
          path: android-bridge/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create Release (on main branch push)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-bridge-${{ github.run_number }}
          name: "Keryx Bridge v1.0.${{ github.run_number }}"
          body: "Automated build from commit ${{ github.sha }}"
          files: android-bridge/app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
